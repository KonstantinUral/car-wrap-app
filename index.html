<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Примерка пленки</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}
h1 {
  margin-top: 20px;
}
canvas {
  margin-top: 20px;

}
button {
  margin: 10px;

}
select {
  padding: 10px;
  margin-top: 10px;
}
</style>

</head>
<body>

<h1>Примерка пленки на авто</h1>

<input type="file" id="upload">

<br>

<select id="textureSelect">
  <option value="black.jpg">Черный</option>
  <option value="red.jpg">Gloss Red</option>
</select>

<br>

<button onclick="processImage()">Просто наложение</button>
<button onclick="generateAI()">AI генерация</button>

<br>

<canvas id="canvas"></canvas>

<script>

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = error => reject(error);
  });
}
  async function uploadToImgBB(base64) {
  const formData = new FormData();
  formData.append("image", base64);

  const response = await fetch("https://api.imgbb.com/1/upload?key=d7e4f27cc0325ac9bdf0437fc95d7c5a", {
    method: "POST",
    body: formData
  });

  const data = await response.json();
  return data.data.url;
}

async function generateAI() {
  const file = document.getElementById("upload").files[0];
  if (!file) return alert("Загрузи фото");

  const base64 = await toBase64(file);
  let imageUrl = await uploadToImgBB(base64);

// 🔥 заменяем avif на jpg
imageUrl = imageUrl.replace(".avif", ".jpg");

console.log("IMAGE URL FIXED:", imageUrl);
  console.log("IMAGE URL:", imageUrl);
  console.log(imageUrl);
  const prompt = "Realistic photo of the same car. Change only the body color to matte black vinyl wrap. Keep everything else identical.";

  const response = await fetch("https://small-wood-eec2.konstantinzakatt66.workers.dev/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
  image: imageUrl,
  prompt: prompt
})
  });

  const data = await response.json();

  if (!data.image) {
    console.log(data);
    alert("Ошибка генерации");
    return;
  }

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = data.image;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
  };
}
</script>

</body>
</html>
