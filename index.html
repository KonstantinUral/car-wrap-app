<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Примерка пленки</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: #111;
  color: white;
}
h1 {
  margin-top: 20px;
}
canvas {
  margin-top: 20px;
  max-width: 90%;
}
button {
  margin: 10px;
  padding: 10px 20px;
  cursor: pointer;
}
select {
  padding: 10px;
  margin-top: 10px;
}
</style>

</head>
<body>

<h1>Примерка пленки на авто</h1>

<input type="file" id="upload">

<br>

<select id="textureSelect">
  <option value="black.jpg">Matte Black</option>
  <option value="red.jpg">Gloss Red</option>
</select>

<br>

<button onclick="processImage()">Просто наложение</button>
<button onclick="generateAI()">AI генерация</button>

<br>

<canvas id="canvas"></canvas>

<script>

const API_KEY = "SG_730c182311d3b307";

function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = error => reject(error);
  });
}

async function generateAI() {
  const file = document.getElementById("upload").files[0];
  if (!file) return alert("Загрузи фото");

  const base64 = await toBase64(file);

  const prompt = "A realistic photo of the same car. Change only the body color to matte raven black vinyl wrap. Keep reflections, lighting, wheels, windows and background unchanged.";

  const response = await fetch("https://api.segmind.com/v1/sdxl-img2img", {
    method: "POST",
    headers: {
      "x-api-key": API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      image: base64,
      prompt: prompt,
      strength: 0.6,
      guidance_scale: 7.5
    })
  });

  const data = await response.json();
  console.log(data);

  const img = new Image();
  img.src = "data:image/png;base64," + data.image;

  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);
  };
}

</script>

</body>
</html>
